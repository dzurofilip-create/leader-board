<!DOCTYPE html>
<html lang="sk">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNDERGROUND RP CASINO</title>

<script>

if(window.innerHeight > window.innerWidth){

    alert("📱 Otoč telefón na šírku pre lepší zážitok 🎰");

}

</script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    height:100vh;
    overflow:hidden;

    background:
    linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1920&auto=format&fit=crop');

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;

    background:
    radial-gradient(circle at center,
    rgba(255,0,0,0.15),
    transparent 60%);

    animation:bgPulse 4s infinite alternate;
}

@keyframes bgPulse{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.1);
    }

}

.casino{
    position:relative;

    width:95%;
    max-width:1050px;

    background:
    linear-gradient(to bottom,
    rgba(25,0,0,0.95),
    rgba(0,0,0,0.97));

    border:4px solid red;
    border-radius:30px;

    padding:25px;

    box-shadow:
    0 0 30px red,
    0 0 80px rgba(255,0,0,0.5);

    overflow:hidden;
}

.casino::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    repeating-linear-gradient(
    45deg,
    rgba(255,0,0,0.03),
    rgba(255,0,0,0.03) 10px,
    transparent 10px,
    transparent 20px);

    pointer-events:none;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.logo{
    font-size:55px;
    font-weight:bold;
    letter-spacing:3px;
    color:white;

    text-shadow:
    0 0 10px white,
    0 0 20px red,
    0 0 40px red;
}

.logo span{
    color:red;
}

.small-logo{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;

    border:4px solid red;

    box-shadow:
    0 0 20px red,
    0 0 40px rgba(255,0,0,0.5);
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin-bottom:25px;
    font-size:18px;
    letter-spacing:3px;
}

.machine{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
}

.slot{
    width:220px;
    height:220px;

    background:
    linear-gradient(to bottom,
    #111,
    #000);

    border:4px solid red;
    border-radius:25px;

    overflow:hidden;
    position:relative;

    box-shadow:
    inset 0 0 25px rgba(255,0,0,0.3),
    0 0 25px red;
}

.reel{
    position:absolute;
    width:100%;
}

.item{
    width:100%;
    height:220px;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    color:white;
    font-size:28px;
    font-weight:bold;

    text-shadow:0 0 15px red;
}

.item img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.center{
    text-align:center;
}

button{
    background:
    linear-gradient(to bottom,
    #ff2b2b,
    #a00000);

    border:none;
    color:white;

    padding:18px 50px;

    font-size:28px;
    border-radius:20px;

    cursor:pointer;
    font-weight:bold;

    box-shadow:
    0 0 25px red,
    inset 0 0 15px rgba(255,255,255,0.3);

    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.result{
    margin-top:25px;
    min-height:50px;

    color:#ff4444;
    font-size:28px;
    font-weight:bold;

    text-shadow:
    0 0 15px red,
    0 0 30px red;
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#777;
    font-size:14px;
    letter-spacing:2px;
}

.win{
    animation:glow 0.5s infinite alternate;
}

@keyframes glow{

    from{
        box-shadow:
        inset 0 0 20px rgba(255,0,0,0.3),
        0 0 20px red;
    }

    to{
        box-shadow:
        inset 0 0 30px rgba(255,255,255,0.3),
        0 0 50px white;
    }

}

/* MOBIL */

@media (max-width: 900px){

    body{
        overflow:auto;
        padding:10px;
        height:auto;
        min-height:100vh;
    }

    .casino{
        width:100%;
        max-width:100%;
        padding:15px;
    }

    .topbar{
        flex-direction:column;
        gap:10px;
    }

    .logo{
        font-size:34px;
        text-align:center;
    }

    .small-logo{
        width:70px;
        height:70px;
    }

    .subtitle{
        font-size:14px;
    }

    .machine{
        gap:8px;
    }

    .slot{
        width:30vw;
        height:30vw;
        min-width:90px;
        min-height:90px;
    }

    .item{
        height:30vw;
        font-size:16px;
    }

    button{
        width:100%;
        font-size:22px;
        padding:15px;
    }

    .result{
        font-size:22px;
    }

    .footer{
        font-size:11px;
    }

}

</style>
</head>

<body>

<div class="casino">

    <div class="topbar">

        <div class="logo">
            UNDERGROUND <span>RP</span>
        </div>

        <img class="small-logo"
        src="https://p16-common-sign.tiktokcdn-eu.com/tos-no1a-avt-0068c001-no/5171e95d4c2b06cbb6dc4b43107805c9~tplv-tiktokx-cropcenter:1080:1080.jpeg?dr=10399&refresh_token=d6a7a5bb&x-expires=1778410800&x-signature=lP3pXEATGJwM1wiM96ON2obbl6A%3D&t=4d5b0474&ps=13740610&shp=a5d48078&shcp=81f88b70&idc=no1a">

    </div>

    <div class="subtitle">
        EMERGENCY HAMBURG CASINO
    </div>

    <div class="machine">

        <div class="slot">
            <div class="reel" id="reel1"></div>
        </div>

        <div class="slot">
            <div class="reel" id="reel2"></div>
        </div>

        <div class="slot">
            <div class="reel" id="reel3"></div>
        </div>

    </div>

    <div class="center">

        <button onclick="spin()">🔴 TOČIŤ</button>

        <div class="result" id="result"></div>

    </div>

    <div class="footer">
        ⚠️ VÝHRY NIE SÚ GARANTOVANÉ • LUCK SYSTEM ZAPNUTÝ • UNDERGROUND RP CASINO
    </div>

</div>

<script>

const rewards = [

    {name:"💵 1K €", chance:65},
    {name:"💵 2K €", chance:50},
    {name:"💵 3K €", chance:45},
    {name:"💵 4K €", chance:30},
    {name:"💵 5K €", chance:25},
    {name:"💵 6K €", chance:10},
    {name:"💵 7K €", chance:5},
    {name:"💰 8K €", chance:3},
    {name:"💰 12.5K €", chance:2},
    {name:"🔥 20K €", chance:1},

    {
        name:"Advanced Tuning",
        chance:0.5,
        image:"https://wiki.emergency-hamburg.com/gamepasses/tuning.png"
    },

    {
        name:"Athlete",
        chance:0.5,
        image:"https://wiki.emergency-hamburg.com/gamepasses/athlete.png"
    },

    {
        name:"Classic Cars",
        chance:0.3,
        image:"https://wiki.emergency-hamburg.com/gamepasses/classic_cars_2.webp"
    },

    {
        name:"Convertible",
        chance:0.1,
        image:"https://wiki.emergency-hamburg.com/gamepasses/convertible-vehicles.png"
    },

    {
        name:"Crime Boss",
        chance:0.05,
        image:"https://wiki.emergency-hamburg.com/gamepasses/crime_boss2.png"
    },

    {
        name:"Electric",
        chance:0.07,
        image:"https://wiki.emergency-hamburg.com/gamepasses/electric-vehicles.png"
    },

    {
        name:"Motorcycles",
        chance:0.05,
        image:"https://wiki.emergency-hamburg.com/gamepasses/motorcycles.png"
    },

    {
        name:"Quads",
        chance:0.3,
        image:"https://wiki.emergency-hamburg.com/gamepasses/quad.png"
    },

    {
        name:"S.E.K",
        chance:0.0001,
        image:"https://wiki.emergency-hamburg.com/gamepasses/s.e.k.jpg"
    },

    {
        name:"Undercover",
        chance:0.07,
        image:"https://wiki.emergency-hamburg.com/gamepasses/undercover.jpg"
    }

];

const spinItems = [

    ...rewards,

    {name:"❌"},
    {name:"💀"},
    {name:"❌"},
    {name:"💀"}

];

function randomItem(){

    return spinItems[
        Math.floor(Math.random()*spinItems.length)
    ];
}

function weightedReward(){

    let total = 0;

    rewards.forEach(r => total += r.chance);

    let random = Math.random() * total;

    for(let reward of rewards){

        if(random < reward.chance){
            return reward;
        }

        random -= reward.chance;
    }
}

function createItemHTML(item){

    if(item.image){

        return `
        <div class="item">
            <img src="${item.image}">
        </div>
        `;

    }else{

        return `
        <div class="item">
            ${item.name}
        </div>
        `;
    }
}

function spinReel(reel,finalReward,duration){

    reel.innerHTML = "";

    for(let i=0;i<30;i++){

        reel.innerHTML += createItemHTML(randomItem());

    }

    reel.innerHTML += createItemHTML(finalReward);

    let pos = 0;

    const interval = setInterval(()=>{

        pos += 35;

        reel.style.transform =
        `translateY(-${pos}px)`;

    },20);

    setTimeout(()=>{

        clearInterval(interval);

        reel.style.transform =
        `translateY(-6600px)`;

    },duration);
}

function spin(){

    const reel1 = document.getElementById("reel1");
    const reel2 = document.getElementById("reel2");
    const reel3 = document.getElementById("reel3");

    const result = document.getElementById("result");

    result.innerHTML = "";

    document.querySelectorAll(".slot").forEach(slot=>{
        slot.classList.remove("win");
    });

    const won = Math.random() < 0.12;

    let reward1;
    let reward2;
    let reward3;

    if(won){

        const finalReward = weightedReward();

        reward1 = finalReward;
        reward2 = finalReward;
        reward3 = finalReward;

    }else{

        reward1 = randomItem();
        reward2 = randomItem();
        reward3 = randomItem();

        while(
            reward1.name === reward2.name &&
            reward2.name === reward3.name
        ){

            reward3 = randomItem();
        }
    }

    spinReel(reel1,reward1,2200);
    spinReel(reel2,reward2,3200);
    spinReel(reel3,reward3,4200);

    setTimeout(()=>{

        if(
            reward1.name === reward2.name &&
            reward2.name === reward3.name
        ){

            document.querySelectorAll(".slot").forEach(slot=>{
                slot.classList.add("win");
            });

            result.innerHTML =
            "🎉 VYHRAL SI: " + reward1.name;

        }else{

            result.innerHTML =
            "😢 Tentokrát nič...";
        }

    },4500);

}

</script>

</body>
</html>
