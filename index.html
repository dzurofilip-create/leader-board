<!DOCTYPE html>
<html lang="sk">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNDERGROUND RP CASINO</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    height:100vh;
    overflow:hidden;

    background:
    linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1920&auto=format&fit=crop');

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;
}

.casino{

    width:95%;
    max-width:1100px;

    background:
    linear-gradient(to bottom,
    rgba(25,0,0,0.95),
    rgba(0,0,0,0.97));

    border:4px solid red;
    border-radius:30px;

    padding:25px;

    box-shadow:
    0 0 30px red,
    0 0 80px rgba(255,0,0,0.5);

}

.logo{
    text-align:center;
    color:white;
    font-size:55px;
    font-weight:bold;

    margin-bottom:10px;

    text-shadow:
    0 0 10px white,
    0 0 20px red,
    0 0 40px red;
}

.logo span{
    color:red;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin-bottom:25px;
    letter-spacing:3px;
}

.main{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    flex-wrap:wrap;
}

.machine{
    display:flex;
    gap:20px;
}

.slot{
    width:200px;
    height:200px;

    background:#000;

    border:4px solid red;
    border-radius:20px;

    overflow:hidden;
    position:relative;

    box-shadow:
    0 0 20px red,
    inset 0 0 20px rgba(255,0,0,0.4);
}

.reel{
    position:absolute;
    width:100%;
}

.item{

    width:100%;
    height:200px;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    color:white;
    font-size:24px;
    font-weight:bold;

    text-shadow:0 0 15px red;

}

.item img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.panel{

    width:260px;

    background:rgba(0,0,0,0.5);

    border:3px solid red;
    border-radius:20px;

    padding:20px;

    text-align:center;

    box-shadow:0 0 20px red;

}

.points{

    color:white;
    font-size:30px;
    font-weight:bold;

    margin-bottom:20px;

}

input{

    width:100%;

    padding:15px;

    border:none;
    border-radius:15px;

    background:#111;
    color:white;

    border:2px solid red;

    font-size:22px;
    text-align:center;

    margin-bottom:15px;

}

button{

    width:100%;

    padding:15px;

    border:none;
    border-radius:15px;

    background:
    linear-gradient(to bottom,
    #ff2b2b,
    #a00000);

    color:white;

    font-size:22px;
    font-weight:bold;

    cursor:pointer;

    margin-bottom:15px;

    box-shadow:
    0 0 20px red,
    inset 0 0 10px rgba(255,255,255,0.2);

}

button:hover{
    transform:scale(1.03);
}

.result{

    margin-top:15px;

    color:#ff4444;

    font-size:24px;
    font-weight:bold;

    min-height:60px;

}

.win{
    animation:glow 0.5s infinite alternate;
}

@keyframes glow{

    from{
        box-shadow:
        0 0 20px red,
        inset 0 0 20px rgba(255,0,0,0.4);
    }

    to{
        box-shadow:
        0 0 40px white,
        inset 0 0 30px rgba(255,255,255,0.4);
    }

}

@media(max-width:900px){

    body{
        overflow:auto;
        padding:15px;
        height:auto;
    }

    .main{
        flex-direction:column;
    }

    .machine{
        gap:10px;
    }

    .slot{
        width:30vw;
        height:30vw;
    }

    .item{
        height:30vw;
        font-size:16px;
    }

    .panel{
        width:100%;
    }

}

</style>
</head>

<body>

<div class="casino">

    <div class="logo">
        UNDERGROUND <span>RP</span>
    </div>

    <div class="subtitle">
        EMERGENCY HAMBURG CASINO
    </div>

    <div class="main">

        <!-- AUTOMAT -->

        <div class="machine">

            <div class="slot">
                <div class="reel" id="reel1"></div>
            </div>

            <div class="slot">
                <div class="reel" id="reel2"></div>
            </div>

            <div class="slot">
                <div class="reel" id="reel3"></div>
            </div>

        </div>

        <!-- PANEL -->

        <div class="panel">

            <div class="points">
                🎟️ TOČKY:
                <span id="points">0</span>
            </div>

            <input
            type="number"
            id="moneyInput"
            placeholder="Napr. 4000">

            <button onclick="addPoints()">
                ➕ PRIDAŤ TOČKY
            </button>

            <button onclick="spin()">
                🔴 TOČIŤ
            </button>

            <div class="result" id="result"></div>

        </div>

    </div>

</div>

<script>

const rewards = [

    {name:"💵 1K €", chance:80},
    {name:"💵 2K €", chance:60},
    {name:"💵 3K €", chance:45},
    {name:"💵 4K €", chance:30},
    {name:"💵 5K €", chance:20},
    {name:"💵 6K €", chance:15},
    {name:"💵 7K €", chance:10},
    {name:"💵 8K €", chance:6},
    {name:"💰 12.5K €", chance:3},
    {name:"🔥 20K €", chance:1},

    {
        name:"⚙️ TUNING",
        chance:0.7,
        image:"https://wiki.emergency-hamburg.com/gamepasses/tuning.png"
    },

    {
        name:"🏃 ATHLETE",
        chance:0.7,
        image:"https://wiki.emergency-hamburg.com/gamepasses/athlete.png"
    },

    {
        name:"🚗 CLASSIC",
        chance:0.4,
        image:"https://wiki.emergency-hamburg.com/gamepasses/classic_cars_2.webp"
    }

];

const spinItems = [

    ...rewards,

    {name:"❌"},
    {name:"💀"},
    {name:"❌"},
    {name:"💀"}

];

let points = 0;

function addPoints(){

    const money =
    parseInt(document.getElementById("moneyInput").value);

    if(!money || money < 1000){

        alert("❌ Minimálne 1000€");

        return;
    }

    const added =
    Math.floor(money / 1000);

    points += added;

    document.getElementById("points").innerHTML =
    points;

    document.getElementById("moneyInput").value = "";

}

function randomItem(){

    return spinItems[
        Math.floor(Math.random()*spinItems.length)
    ];

}

function weightedReward(){

    let total = 0;

    rewards.forEach(r => total += r.chance);

    let random = Math.random() * total;

    for(let reward of rewards){

        if(random < reward.chance){

            return reward;

        }

        random -= reward.chance;

    }

}

function createItemHTML(item){

    if(item.image){

        return `
        <div class="item">
            <img src="${item.image}">
        </div>
        `;

    }else{

        return `
        <div class="item">
            ${item.name}
        </div>
        `;
    }

}

function spinReel(reel,finalReward,duration){

    reel.innerHTML = "";

    for(let i=0;i<30;i++){

        reel.innerHTML += createItemHTML(randomItem());

    }

    reel.innerHTML += createItemHTML(finalReward);

    let pos = 0;

    const interval = setInterval(()=>{

        pos += 35;

        reel.style.transform =
        `translateY(-${pos}px)`;

    },20);

    setTimeout(()=>{

        clearInterval(interval);

        reel.style.transform =
        `translateY(-6000px)`;

    },duration);

}

function spin(){

    const result =
    document.getElementById("result");

    if(points <= 0){

        result.innerHTML =
        "❌ NEMÁŠ TOČKY";

        return;

    }

    points--;

    document.getElementById("points").innerHTML =
    points;

    const reel1 =
    document.getElementById("reel1");

    const reel2 =
    document.getElementById("reel2");

    const reel3 =
    document.getElementById("reel3");

    result.innerHTML = "";

    document.querySelectorAll(".slot")
    .forEach(slot=>{

        slot.classList.remove("win");

    });

    // REALISTICKEJŠIA ŠANCA

    const won =
    Math.random() < 0.22;

    let reward1;
    let reward2;
    let reward3;

    if(won){

        const finalReward =
        weightedReward();

        reward1 = finalReward;
        reward2 = finalReward;
        reward3 = finalReward;

    }else{

        reward1 = randomItem();
        reward2 = randomItem();
        reward3 = randomItem();

        while(

            reward1.name === reward2.name &&
            reward2.name === reward3.name

        ){

            reward3 = randomItem();

        }

    }

    spinReel(reel1,reward1,2200);
    spinReel(reel2,reward2,3200);
    spinReel(reel3,reward3,4200);

    setTimeout(()=>{

        if(

            reward1.name === reward2.name &&
            reward2.name === reward3.name

        ){

            document.querySelectorAll(".slot")
            .forEach(slot=>{

                slot.classList.add("win");

            });

            result.innerHTML =
            "🎉 VYHRAL SI: " +
            reward1.name;

        }else{

            result.innerHTML =
            "😢 Tentokrát nič...";

        }

    },4500);

}

</script>

</body>
</html>
